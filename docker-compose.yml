services:
  mysql:
    image: mysql:8
    command: --max_allowed_packet=325058560 --lower_case_table_names=2
    volumes:
      - .docker-dev/.data/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=test-technique
      - MYSQL_PASSWORD=root
    ports:
      - 3344:3306

  app:
    build: .docker-dev/app
    ports:
      - 8000:8000
    environment:
      - IS_DOCKER=1
      - DATABASE_URL=mysql://root:root@mysql:3306/test-technique?serverVersion=8.0.32&charset=utf8mb4
      - ELASTICSEARCH_URL=http://elasticsearch:9200/
      - MESSENGER_TRANSPORT_DSN=amqp://guest:guest@rabbitmq:5672/%2f/messages
    links:
      - mysql
    volumes:
      - .:/var/application

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 15676:15672

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.3
    ports:
      - 9201:9200
    environment:
      - discovery.type=single-node
      - http.port=9200
      - ES_JAVA_OPTS=-Xms2g -Xmx8g
